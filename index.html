<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>若杉行政書士事務所 AIサポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --navy: #1e3a6e;
      --navy-dark: #142a52;
      --navy-light: #2d5a9e;
      --blue: #4a90d9;
      --blue-light: #e8f2fc;
      --white: #ffffff;
      --gray-bg: #f0f3f9;
      --gray: #7a7a8a;
      --text: #2c2c3e;
      --border: #dde3ef;
      --ai-bubble: #ffffff;
      --user-bubble: #1e3a6e;
    }
    html, body {
      height: 100%;
      font-family: 'Hiragino Kaku Gothic ProN','ヒラギノ角ゴ ProN','Meiryo','メイリオ',sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── レイアウト ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--navy);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.3);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-logo {
      width: 38px; height: 38px;
      background: white;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info { flex: 1; }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      opacity: 0.8;
    }
    .online-badge {
      background: #2ecc71;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── チャットエリア ── */
    #chatWrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── メッセージグループ ── */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 4px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── バブル ── */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user {
      flex-direction: row-reverse;
    }
    .ai-icon {
      width: 36px; height: 36px;
      background: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .bubble {
      max-width: 78%;
      padding: 13px 16px;
      border-radius: 18px;
      font-size: 17px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai {
      background: var(--ai-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .bubble.user {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* ── タイピングインジケーター ── */
    .typing-bubble {
      background: var(--ai-bubble);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .typing-dot {
      width: 8px; height: 8px;
      background: var(--navy);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── 選択ボタン ── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 44px;
      padding-right: 4px;
      margin-top: 2px;
    }
    .choice-btn {
      background: white;
      border: 2px solid var(--navy);
      color: var(--navy);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .choice-btn:active {
      transform: scale(0.97);
    }
    .choice-btn.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .choice-btn.selected {
      background: var(--navy);
      color: white;
      opacity: 1;
    }
    .choice-icon {
      font-size: 20px;
      flex-shrink: 0;
    }
    .choice-text { flex: 1; }

    /* ── 日時ラベル ── */
    .time-label {
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      margin: 8px 0 4px;
    }

    /* ── 入力エリア ── */
    .input-area {
      background: white;
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .mic-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2px solid var(--navy);
      background: white;
      color: var(--navy);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .mic-btn.recording {
      background: #e74c3c;
      border-color: #e74c3c;
      color: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,.4); }
      50%       { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
    }
    .text-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 11px 16px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: var(--gray-bg);
      transition: border 0.2s;
    }
    .text-input:focus {
      border-color: var(--navy);
      background: white;
    }
    .send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: var(--navy);
      color: white;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .send-btn:active { opacity: 0.7; }

    /* ── ボトムシート ── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }
    .sheet-overlay.open {
      display: flex;
    }
    .sheet {
      background: white;
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .sheet-handle {
      width: 40px; height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .sheet-sub {
      font-size: 15px;
      color: var(--gray);
      margin-bottom: 20px;
    }
    .sheet-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 18px;
      font-family: inherit;
      letter-spacing: 0.1em;
      outline: none;
      text-align: center;
      margin-bottom: 12px;
    }
    .sheet-input:focus { border-color: var(--navy); }
    .sheet-btn {
      width: 100%;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }
    .sheet-btn:active { opacity: 0.8; }
    .sheet-btn.secondary {
      background: white;
      color: var(--navy);
      border: 2px solid var(--navy);
    }
    .form-row {
      margin-bottom: 14px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      display: block;
    }
    .form-select, .form-textarea {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    .form-select:focus, .form-textarea:focus { border-color: var(--navy); }
    .form-textarea { min-height: 80px; resize: vertical; }

    /* ── 案件カード ── */
    .case-card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin: 6px 0 2px;
    }
    .case-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .case-avatar {
      width: 44px; height: 44px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .case-name { font-size: 18px; font-weight: 700; }
    .case-id { font-size: 13px; color: var(--gray); }
    .case-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }
    .case-row:last-child { border-bottom: none; }
    .case-key { color: var(--gray); }
    .case-val { font-weight: 600; }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .status-0 { background: #fef9e7; color: #d35400; }
    .status-1 { background: #eaf7fb; color: #2980b9; }
    .status-2 { background: #eaf7fb; color: #2980b9; }
    .status-3 { background: #eafaf1; color: #27ae60; }
    .status-4 { background: #f9f9f9; color: #7f8c8d; }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--navy), var(--blue));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* ── FAQ ── */
    .faq-item {
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      margin: 4px 0;
    }
    .faq-q {
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      font-size: 15px;
    }
    .faq-a {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── 料金テーブル ── */
    .fee-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      margin: 4px 0;
    }
    .fee-table th {
      background: var(--navy);
      color: white;
      padding: 10px 12px;
      text-align: left;
    }
    .fee-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .fee-table tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
<div id="app">
  <!-- ヘッダー -->
  <header class="app-header">
    <div class="header-logo">⚖️</div>
    <div class="header-info">
      <div class="header-title">若杉行政書士事務所</div>
      <div class="header-sub">AIサポートアシスタント</div>
    </div>
    <div class="online-badge">24時間対応</div>
  </header>

  <!-- チャットエリア -->
  <div id="chatWrap"></div>

  <!-- 入力エリア -->
  <div class="input-area">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
    <input class="text-input" id="textInput" type="text" placeholder="ご質問をどうぞ…"
      onkeydown="if(event.key==='Enter')sendText()">
    <button class="send-btn" onclick="sendText()" title="送信">➤</button>
  </div>
</div>

<!-- 案件番号シート -->
<div class="sheet-overlay" id="caseSheet" onclick="if(event.target===this)closeSheet('caseSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📋 案件番号を入力</div>
    <div class="sheet-sub">担当者からお伝えした「WK-」から始まる番号を入力してください</div>
    <input class="sheet-input" id="caseInput" type="text" placeholder="例：WK-001"
      onkeydown="if(event.key==='Enter')submitCase()">
    <button class="sheet-btn" onclick="submitCase()">確認する</button>
    <button class="sheet-btn secondary" onclick="closeSheet('caseSheet')">キャンセル</button>
  </div>
</div>

<!-- 相談予約シート -->
<div class="sheet-overlay" id="consultSheet" onclick="if(event.target===this)closeSheet('consultSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📅 無料相談のお申込み</div>
    <div class="sheet-sub">お気軽にどうぞ。後ほど担当者よりご連絡いたします。</div>
    <div class="form-row">
      <label class="form-label">お名前</label>
      <input class="sheet-input" id="consultName" type="text" placeholder="例：田中 太郎" style="text-align:left">
    </div>
    <div class="form-row">
      <label class="form-label">電話番号</label>
      <input class="sheet-input" id="consultPhone" type="tel" placeholder="例：029-XXX-XXXX" style="text-align:left">
    </div>
    <div class="form-row">
      <label class="form-label">ご相談内容</label>
      <select class="form-select" id="consultType">
        <option value="">-- 選択してください --</option>
        <option value="相続・遺言">相続・遺言・遺産整理</option>
        <option value="建設業許可">建設業許可</option>
        <option value="在留資格">在留資格・ビザ申請</option>
        <option value="会社設立">会社設立</option>
        <option value="古物商">古物商許可</option>
        <option value="飲食店">飲食店営業許可</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">ご希望日時（任意）</label>
      <textarea class="form-textarea" id="consultNote" placeholder="例：平日午後がご都合よいです"></textarea>
    </div>
    <button class="sheet-btn" onclick="submitConsult()">申込む</button>
    <button class="sheet-btn secondary" onclick="closeSheet('consultSheet')">キャンセル</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// 状態管理
// ──────────────────────────────────────────────
let awaitingCase = false;
let awaitingConsult = false;
let currentClient = null;

// ──────────────────────────────────────────────
// AI 知識ベース（若杉事務所HPより）
// ──────────────────────────────────────────────
const AI_KB = {
  greeting: {

    choices: [
      { icon: '📜', text: '相続・遺言のご相談' },

    choices: [

  },

  kensetsu: {

  },

  kensetsu_fee: {

    choices: [
      { icon: '🗓️', text: '無料相談を申込む' },

      { icon: '🔙', text: '許認可メニューへ戻る' }
    ]
  },

  visa: {
    text: `在留資格・ビザ申請についてですね。\n経営管理ビザや就労ビザなど\n各種在留資格に対応しています。\n\nどちらをお知りになりたいですか？`,
    choices: [
      { icon: '💴', text: '費用・料金を知りたい' },
      { icon: '📋', text: '必要書類を知りたい' },
      { icon: '🗓️', text: '無料相談を申込む' }
    ]

// ──────────────────────────────────────────────
// AI応答ロジック
// ──────────────────────────────────────────────
function getAIResponse(input) {
  const s = input.replace(/\s/g, '').toLowerCase();

  // 挨拶
  if (/^(こんにちは|おはよう|こんばんは|はじめまして|よろしく|hello|hi)/.test(s))
    return AI_KB.greeting;

  // トップへ戻る
  if (/トップ|最初|はじめ|ホーム/.test(s))
    return AI_KB.greeting;

  // 相続・遺言
  if (/相続|遺言|遺産|相続人|遺族/.test(s)) {
    if (/費用|料金|いくら|値段|price/.test(s)) return AI_KB.souzoku_fee;
    if (/書類|必要|準備/.test(s)) return AI_KB.souzoku_docs;
    if (/流れ|手順|ステップ|プロセス/.test(s)) return AI_KB.souzoku_flow;
    return AI_KB.souzoku;
  }

  // 建設業
  if (/建設|工事|許可/.test(s)) {
    if (/費用|料金|いくら/.test(s)) return AI_KB.kensetsu_fee;
    return AI_KB.kensetsu;
  }

  // 在留・ビザ
  if (/在留|ビザ|visa|外国人|国籍|就労/.test(s)) {
    if (/費用|料金|いくら/.test(s)) return AI_KB.visa_fee;
    return AI_KB.visa;
  }

  // 会社設立
  if (/会社|設立|法人|株式|合同/.test(s)) {
    if (/費用|料金|いくら/.test(s)) return AI_KB.kaisha_fee;
    return AI_KB.kaisha;
  }

  // 古物商
  if (/古物|フリマ|メルカリ|リサイクル/.test(s))
    return AI_KB.kobutsu;

  // 飲食
  if (/飲食|レストラン|カフェ|食品|食堂/.test(s))
    return AI_KB.inshoku;

  // その他許認可
  if (/許認可|許可|その他/.test(s))
    return AI_KB.others;

  // 案件確認
  if (/案件|進捗|状況|確認|ログイン/.test(s))
    return AI_KB.mycase;

  // 案件番号ショートカット
  if (/wk[-－]?\d+/i.test(input))
    return { text: `案件番号を確認します。`, choices: [] };

  // 相談予約
  if (/相談|予約|申込|申し込|面談/.test(s))
    return AI_KB.consult;

  // 料金一般
  if (/費用|料金|値段|いくら|price/.test(s)) {
    return {
      text: `料金のお問い合わせですね。\nどのサービスについてお知りになりたいですか？`,
      choices: [
        { icon: '📜', text: '相続・遺言の費用' },
        { icon: '🏢', text: '建設業許可の費用' },
        { icon: '🌐', text: 'ビザ・在留資格の費用' }
      ]
    };
  }

  // 電話
  if (/電話|tel|連絡先|番号|029/.test(s))
    return AI_KB.tel;

  return AI_KB.fallback;
}

// チャット描画
// ──────────────────────────────────────────────
function nowStr() {
  const d = new Date();
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function appendUser(text) {
  const chat = document.getElementById('chatWrap');
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `
    <div class="bubble-row user">
      <div class="bubble user">${escHtml(text)}</div>
    </div>`;
  chat.appendChild(g);
  scrollBottom();
}

function appendTyping() {
  const chat = document.getElementById('chatWrap');
  const el = document.createElement('div');
  el.className = 'msg-group';
  el.id = 'typingIndicator';
  el.innerHTML = `
    <div class="bubble-row">
      <div class="ai-icon">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  chat.appendChild(el);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function appendAI(text, choices = [], card = null) {
  removeTyping();
  const chat = document.getElementById('chatWrap');
  const g = document.createElement('div');
  g.className = 'msg-group';

  let inner = `
    <div class="bubble-row">
      <div class="ai-icon">🤖</div>
      <div class="bubble ai">${escHtml(text)}</div>
    </div>`;

  if (card) inner += card;

  if (choices.length > 0) {
    inner += `<div class="choices">`;
    choices.forEach(c => {
      inner += `<button class="choice-btn" onclick="onChoiceClick(this, '${escAttr(c.text)}')">
        <span class="choice-icon">${c.icon}</span>
        <span class="choice-text">${escHtml(c.text)}</span>
      </button>`;
    });
    inner += `</div>`;
  }

  g.innerHTML = inner;
  chat.appendChild(g);
  scrollBottom();

  // 音声読み上げ
  speakText(text);
}

function onChoiceClick(btn, text) {
  // 同グループのボタンを無効化
  const group = btn.closest('.msg-group');
  group.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.add('disabled');
    if (b === btn) b.classList.add('selected');
  });
  handleInput(text);
}

function scrollBottom() {
  const chat = document.getElementById('chatWrap');
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function escAttr(s) {
  return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ──────────────────────────────────────────────
// 入力ハンドラ
// ──────────────────────────────────────────────
function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  handleInput(text);
}

function handleInput(text) {
  // シート待機中
  if (awaitingCase) { closeSheet('caseSheet'); awaitingCase = false; }
  if (awaitingConsult) { closeSheet('consultSheet'); awaitingConsult = false; }

  appendUser(text);

  // 案件番号直接入力
  const caseMatch = text.match(/WK[-－]?(\d+)/i);
  if (caseMatch) {
    const id = 'WK-' + String(parseInt(caseMatch[1])).padStart(3,'0');
    appendTyping();
    setTimeout(() => loginWithId(id), 800);
    return;
  }

  // 特殊コマンド
  const s = text.replace(/\s/g,'');
  if (/案件番号を入力する/.test(s)) {
    openSheet('caseSheet');
    document.getElementById('caseInput').focus();
    setTimeout(() => appendAI('案件番号入力フォームを開きました。\nWK-から始まる番号をご入力ください。', [
      { icon: '🔙', text: 'トップへ戻る' }
    ]), 100);
    return;
  }
  if (/相談フォームに入力する/.test(s)) {
    openSheet('consultSheet');
    setTimeout(() => appendAI('相談申込フォームを開きました。\nご都合の良い日時などをご記入ください。', [
      { icon: '🔙', text: 'トップへ戻る' }
    ]), 100);
    return;
  }
  if (/電話で(確認|予約)する/.test(s)) {
    appendTyping();
    setTimeout(() => appendAI('お電話番号はこちらです。\n\n📞 029-846-7050\n\n平日 9:00〜18:00 受付', [
      { icon: '🗓️', text: '無料相談を申込む' },
      { icon: '🏠', text: 'トップへ戻る' }
    ]), 600);
    return;
  }
  if (/無料相談を申込む/.test(s)) {
    openSheet('consultSheet');
    setTimeout(() => appendAI('相談申込フォームを開きました。', [
      { icon: '🔙', text: 'トップへ戻る' }
    ]), 100);
    return;
  }

  // AI応答
  appendTyping();
  const delay = 600 + Math.random() * 400;
  setTimeout(() => {
    const resp = getAIResponse(text);
    appendAI(resp.text, resp.choices || []);
  }, delay);
}

function loginWithId(id) {
  const raw = localStorage.getItem('wk_clients');
  const clients = raw ? JSON.parse(raw) : [];
  const client = clients.find(c => c.id === id || c.caseId === id);

  if (!client) {
    appendAI(`「${id}」の案件情報が見つかりませんでした。\n\n案件番号をご確認のうえ、もう一度お試しください。\nご不明な場合はお電話（029-846-7050）にてご確認いただけます。`, [
      { icon: '🔑', text: '案件番号を入力する' },
      { icon: '📞', text: '電話で確認する（029-846-7050）' },
      { icon: '🏠', text: 'トップへ戻る' }
    ]);
    return;
  }

  currentClient = client;
  const statusLabels = ['相談受付', '書類確認中', '申請準備中', '申請済み', '完了'];
  const statusClass = ['status-0','status-1','status-2','status-3','status-4'];
  const progressPct = [10, 35, 60, 85, 100];
  const si = Number(client.status) || 0;
  const statusLabel = statusLabels[si] || client.status || '確認中';
  const pct = progressPct[si] || 10;
  const sc = statusClass[si] || 'status-0';

  const docs = Array.isArray(client.documents) ? client.documents : (client.docs || []);
  const docsHtml = docs.length > 0
    ? docs.map(d => {
        const ok = d.submitted || d.checked;
        return `<div class="case-row"><span class="case-key">${escHtml(d.name || d)}</span><span class="case-val">${ok ? '✅ 提出済み' : '⏳ 未提出'}</span></div>`;
      }).join('')
    : `<div class="case-row"><span class="case-key">担当者にご確認ください</span></div>`;

  const card = `
    <div class="case-card" style="margin-top:8px">
      <div class="case-header">
        <div class="case-avatar">👤</div>
        <div>
          <div class="case-name">${escHtml(client.name)} 様</div>
          <div class="case-id">${escHtml(id)}</div>
        </div>
      </div>
      <div class="case-row">
        <span class="case-key">ご依頼内容</span>
        <span class="case-val">${escHtml(client.category || client.service || '確認中')}</span>
      </div>
      <div class="case-row">
        <span class="case-key">担当者</span>
        <span class="case-val">${escHtml(client.staff || '若杉 行政書士')}</span>
      </div>
      <div class="case-row">
        <span class="case-key">現在の状況</span>
        <span class="case-val"><span class="status-badge ${sc}">${escHtml(statusLabel)}</span></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:13px;color:var(--gray);margin-top:6px">進捗 ${pct}%</div>
      <div style="margin-top:12px;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px">書類の状況</div>
      ${docsHtml}
    </div>`;

  appendAI(`${escHtml(client.name)} 様の案件情報をお知らせします。`, [
    { icon: '❓', text: 'よくある質問を見る' },
    { icon: '📞', text: '担当者に連絡する（029-846-7050）' },
    { icon: '🏠', text: 'トップへ戻る' }
  ], card);
}

// ──────────────────────────────────────────────
// 音声入力
// ──────────────────────────────────────────────
let recognition = null;
let isRecording = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('お使いのブラウザは音声入力に対応していません。\nChrome または Safari をご利用ください。');
    return;
  }
  if (isRecording) {
    recognition && recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
  };
  recognition.onresult = e => {
    const txt = e.results[0][0].transcript;
    document.getElementById('textInput').value = txt;
    setTimeout(sendText, 200);
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.start();
}

// ──────────────────────────────────────────────
// 音声読み上げ
// ──────────────────────────────────────────────
function speakText(text) {
  if (!window.speechSynthesis) return;
  const clean = text.replace(/[📜🏢📋💴📅🗓️✅⏳❓📞🏠🔑🔙📝🌐🎎🍜⚖️👤🤖😊▼①②③④⑤⑥]/gu, '')
                    .replace(/【.*?】/g, '').replace(/\n/g,' ').trim();
  const u = new SpeechSynthesisUtterance(clean.substring(0, 100));
  u.lang = 'ja-JP';
  u.rate = 0.95;
  u.pitch = 1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
